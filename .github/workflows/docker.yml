name: Docker Build

on:
  push:
    paths:
      - "apps/indexer/**"
      - "apps/indexer/Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
  pull_request:
    paths:
      - "apps/indexer/**"
      - "apps/indexer/Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build indexer image
        uses: docker/build-push-action@v5
        with:
          push: false
          load: true
          context: .
          file: apps/indexer/Dockerfile
          tags: axiom-indexer:ci

      - name: Smoke test
        run: docker run --rm axiom-indexer:ci node dist/index.js --help || true
