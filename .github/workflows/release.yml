name: CD Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push indexer image
        uses: docker/build-push-action@v5
        with:
          push: true
          context: .
          file: apps/indexer/Dockerfile
          tags: |
            ghcr.io/symulacr/axiom-protocol/indexer:${{ env.VERSION }}
            ghcr.io/symulacr/axiom-protocol/indexer:latest

      # Future: Build and push backend + oracle images

  release:
    needs: [docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Published Docker Images

            | Package | Tags |
            |---------|------|
            | `ghcr.io/symulacr/axiom-protocol/indexer` | `${{ env.VERSION }}`, `latest` |
