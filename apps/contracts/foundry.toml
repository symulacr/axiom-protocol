[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"
broadcast = "broadcast"

# Cancun mandatory on 0G Chain
evm_version = "cancun"

# Solidity 0.8.20 (per 0G reference repo)
solc = "0.8.20"

# Optimizer on, 200 runs
optimizer = true
optimizer_runs = 200

# viaIR on (per 0G docs)
via_ir = true

# Test settings
verbosity = 2
gas_reports = ["*"]
fuzz = { runs = 256 }

# CI profile with more aggressive fuzzing
[profile.ci]
verbosity = 3
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 32, fail_on_revert = true }

# Format settings (using [fmt] section for newer Foundry)
[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "params_first"
quote_style = "double"
number_underscore = "thousands"
